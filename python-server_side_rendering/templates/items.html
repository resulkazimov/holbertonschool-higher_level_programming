<!doctype html>
<html lang="en">
<head>
    <title>Items List - My Flask App</title>
</head>
<body>
    {% include 'header.html' %}
    <h1>Items List</h1>

        {% for item in items %}

        {% else %}

        {% endfor %}
    </ul>
    {% include 'footer.html' %}
</body>
</html>
